    <path d="M206 40h310a36 36 0 0 1 36 36v28a36 36 0 0 1-36 36H206a36 36 0 0 1-36-36V76a36 36 0 0 1 36-36Z" fill="url(#wa)"/>
    <text x="190" y="87" class="txt med">Perfeito! Bons estudos!</text><text x="455" y="91" class="txt small" opacity=".75">12:03 ✓✓</text>
