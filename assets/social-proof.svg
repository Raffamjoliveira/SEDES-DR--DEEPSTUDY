    <rect x="45" y="198" width="430" height="188" rx="14" fill="#1a2428"/>
    <text x="63" y="234" class="txt med">Boa tarde, queria parabenizar,</text>
    <text x="63" y="268" class="txt med">ferramenta é muuuito boa, ajudou</text>
    <text x="63" y="302" class="txt med">eu me organizar e começar a ver</text>
    <text x="63" y="336" class="txt med">evolução. Amei também o suporte,</text>
    <text x="63" y="370" class="txt med">vcs sao 10!</text><text x="410" y="373" class="muted small">17:08</text>
    <rect x="36" y="396" width="435" height="62" rx="30" fill="#1a2227"/><text x="85" y="436" class="muted med">Mensagem</text><text x="478" y="436" class="txt med">🎙</text>
