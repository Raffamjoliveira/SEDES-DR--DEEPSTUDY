    <text x="1228" y="166" class="reply">Responder    Ocultar</text><text x="1608" y="210" class="txt small">1</text>
    <rect x="1122" y="232" width="535" height="188" fill="#17212b" opacity=".72"/>
    <circle cx="1234" cy="291" r="31" fill="#ffef18"/><text x="1219" y="303" class="txt med">👨</text><text x="1278" y="289" class="user txt">@raffaelensina_</text><text x="1437" y="289" class="muted small">✓ 7 min · Autor</text>
    <text x="1278" y="328" class="txt med"><tspan fill="#8eb8ff">@guilhermefontoro</tspan> bons estudos</text><text x="1278" y="366" class="txt med">🚀🚀💖</text><text x="1278" y="406" class="reply">Responder</text>
