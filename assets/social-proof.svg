    <circle cx="82" cy="556" r="39" fill="#ff9e00"/><circle cx="82" cy="556" r="31" fill="#1d3546"/><text x="129" y="545" class="user txt">jesicamarquees</text><text x="280" y="545" class="muted small">4 min 🛳️❤️</text>
    <text x="129" y="583" class="txt med">Nunca mexi com IA, achei que ia ser</text><text x="129" y="618" class="txt med">difícil, mas com 5 minutos já tava</text><text x="129" y="653" class="txt med">estudando com edital verticalizado,</text><text x="129" y="688" class="txt med">muito show, parabens!</text>
    <text x="129" y="724" class="reply">Responder     Ocultar</text><text x="526" y="603" class="heart big">●</text><text x="534" y="650" class="txt small">1</text>
