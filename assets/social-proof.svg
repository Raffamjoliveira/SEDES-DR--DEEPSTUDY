    <circle cx="116" cy="774" r="31" fill="#ffef18"/><text x="101" y="786" class="txt med">👨</text><text x="164" y="772" class="user txt">@raffaelensina_</text><text x="323" y="772" class="muted small">✓ 1 s · Autor</text>
