<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 920" role="img" aria-labelledby="title desc">
  <title id="title">Depoimentos de alunos sobre a DeepStudy</title>
  <desc id="desc">Montagem com prints de conversas e comentários elogiando a ferramenta de estudos.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="70%" stop-color="#05070c"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#141a25"/>
      <stop offset="100%" stop-color="#0b1018"/>
    </linearGradient>
    <linearGradient id="wa" x1="0" x2="1">
      <stop offset="0%" stop-color="#0b6f49"/>
      <stop offset="100%" stop-color="#05b977"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <style>
      .txt{font-family:Inter,Arial,sans-serif;fill:#f3f6fb}.muted{fill:#9aa4b2}.small{font-size:22px}.med{font-size:28px}.big{font-size:34px;font-weight:700}.user{font-size:27px;font-weight:800}.heart{fill:#ff174d}.check{fill:#21d58b}.reply{fill:#a9b2bf;font-size:21px}.bubble{fill:#1a262a}.bubble2{fill:url(#wa)}
    </style>
  </defs>
  <rect width="1680" height="920" fill="url(#bg)"/>

