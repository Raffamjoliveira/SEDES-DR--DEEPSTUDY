    <text x="640" y="558" class="txt med">Te passando o feedback!</text><text x="640" y="592" class="txt med">Tudo certo, a princípio a ferramenta</text><text x="640" y="626" class="txt med">está me ajudando demais a organizar</text><text x="640" y="660" class="txt med">meus estudos e priorizar o que realmente</text><text x="640" y="694" class="txt med">cai na prova. Já consegui otimizar muito</text><text x="640" y="728" class="txt med">meu tempo. Parabéns pelo trabalho! 👊🏻</text><text x="1027" y="764" class="muted small">10:04</text>
    <path d="M679 792h452l25-30v96a36 36 0 0 1-36 36H679a36 36 0 0 1-36-36v-30a36 36 0 0 1 36-36Z" class="bubble2"/>
